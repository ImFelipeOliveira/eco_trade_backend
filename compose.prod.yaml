services:
  app:
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 --workers 3 --worker-tmp-dir /dev/shm core.wsgi:application"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ecotrade-backend"

      - "traefik.http.routers.app.rule=Host(`ecotrade.f3-software.com.br`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=letsencryptresolver"

      - "traefik.http.services.app.loadbalancer.server.port=8000"
